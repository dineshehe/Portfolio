{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dinesh Sharma</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<nav class="bg-gray-900 py-2.5">
  <div class="flex flex-wrap items-center justify-between max-w-screen-xl px-4 mx-auto">

    <!-- Logo -->
    <a href="{% url 'home' %}" class="flex items-center">
      <span class="self-center text-3xl font-bold whitespace-nowrap text-white">
        <span class="text-purple-400">Dinesh </span>Sharma
      </span>
    </a>

  
      <!-- Mobile Button -->
      <button 
  data-collapse-toggle="mobile-menu-2"
  type="button"
  class="inline-flex items-center p-2 ml-auto text-white rounded-lg lg:hidden hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-600">

  <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
  </svg>

</button>

<!-- Right Button -->
<div class="flex items-center ml-auto lg:order-2">
  <a href="{% static 'files/Resume.pdf' %}" download
    class="text-white bg-purple-600 hover:bg-purple-700 focus:ring-4 focus:ring-purple-800 font-medium rounded-lg text-sm px-4 lg:px-5 py-2 lg:py-2.5 focus:outline-none">
    Download Resume
  </a>
</div>

   

    <!-- Menu -->
    <div class="items-center justify-between w-full lg:flex lg:w-auto lg:order-1 hidden" id="mobile-menu-2">
      <ul class="flex ml-[150px] flex-col mt-4 font-medium lg:flex-row lg:space-x-8 lg:mt-0">

        <!-- Home -->
        <li>
          <a href="{% url 'home' %}"
         class="relative inline-block py-2 pl-3 pr-4 lg:p-0 transition-all duration-300

    {% if request.resolver_match.url_name == 'home' %}
      text-white font-bold
      after:content-[''] after:absolute after:left-0 after:-bottom-1 
      after:w-full after:h-[2px] after:bg-gradient-to-r 
      after:from-purple-500 after:to-pink-500
    {% else %}
      text-gray-400 hover:text-white
    {% endif %}">
            Home
          </a>
        </li>

        <li>

    {% endif %}">

  <a href="{% url 'about' %}"

</li>

    {% else %}

    {% endif %}">
    
   Messages Records
  </a>
</li>




      </ul>
    </div>
  </div>
</nav>

<script src="https://unpkg.com/flowbite@1.4.1/dist/flowbite.js"></script>


<script>
  const btn = document.querySelector('[data-collapse-toggle]');
  const menu = document.getElementById('mobile-menu-2');

  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
  });
</script>

</body>
</html>
